<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اراء الطلاب | وضع العرض</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #10b981;
            --dark: #1e1b4b;
            --glass: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #f8fafc;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* التصميم الرئيسي (النموذج) */
        .admin-view {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            flex: 1;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        h1 { color: var(--dark); text-align: center; font-weight: 800; }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: #475569; }
        input, textarea {
            width: 100%; padding: 12px; border: 2px solid #e2e8f0;
            border-radius: 12px; font-family: inherit; font-size: 1rem;
            box-sizing: border-box; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; }

        .btn {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            font-size: 1.1rem; font-weight: 800; cursor: pointer;
            transition: 0.3s; margin-bottom: 10px;
        }
        .btn-submit { background: var(--primary); color: white; }
        .btn-presentation { 
            background: var(--dark); color: white; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        /* تذييل صفحة الإدخال */
        .page-footer {
            text-align: center;
            padding: 20px;
            color: #64748b;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: auto;
        }

        /* شاشة العرض (Slideshow Overlay) */
        #slideshowContainer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            z-index: 1000;
            display: none; 
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            flex-direction: column;
            cursor: pointer; /* تغيير شكل الماوس ليدل على إمكانية النقر */
        }

        .presentation-title {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--secondary);
            text-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .slide {
            max-width: 90%;
            animation: fadeIn 0.8s ease-out; /* تسريع حركة الظهور قليلاً لتناسب النقر */
            padding-bottom: 60px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .slide-name {
            font-size: 3rem;
            color: #818cf8;
            margin-bottom: 20px;
            font-weight: 800;
        }

        .slide-feedback {
            font-size: 2rem; 
            line-height: 1.4;
            margin-bottom: 40px;
            font-weight: 700;
        }

        .slide-advice {
            background: rgba(16, 185, 129, 0.2);
            border-right: 8px solid var(--secondary);
            padding: 30px;
            border-radius: 15px;
            font-size: 2.2rem;
            display: inline-block;
            max-width: 80%;
        }

        .close-btn {
            position: absolute; top: 30px; left: 30px;
            background: rgba(255,255,255,0.1);
            color: white; border: none; padding: 10px 20px;
            border-radius: 50px; cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            z-index: 1001;
        }
        
        .close-btn:hover {
            background: rgba(255,0,0,0.6);
        }

        .presentation-footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        
        .click-hint {
            margin-top: 40px;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 0.8; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div class="admin-view">
        <div class="card">
            <h1>🎮 شارك برأيك في اللعبة</h1>
            <form id="surveyForm">
                <div class="input-group">
                    <label>اسم الطالب</label>
                    <input type="text" name="name" placeholder="مثال: احمد محمد الغافري " required>
                </div>
                <div class="input-group">
                    <label>ماذا تعلمت من اللعبة؟</label>
                    <textarea name="feedback" rows="3" placeholder="اكتب رأيك هنا..." required></textarea>
                </div>
                <div class="input-group">
                    <label>نصيحة لزملائك الطلاب</label>
                    <textarea name="advice" rows="2" placeholder="بماذا تنصح الطلاب عند استخدام الانترنت؟"></textarea>
                </div>
                <button type="submit" class="btn btn-submit" id="submitBtn">إرسال المشاركة</button>
            </form>
            
            <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">
            
            <button class="btn btn-presentation" onclick="startSlideshow()">
                <span>📺 فتح شاشة العرض المدرسية</span>
            </button>
            <p style="text-align:center; font-size: 0.9rem; color: #64748b;">(انقر للتحكم اليدوي في عرض المشاركات)</p>
        </div>
    </div>

    <div class="page-footer">
        إعداد معلمي تقنية المعلومات بمدرسة محمد بن سليمان الغافري
    </div>

    <div id="slideshowContainer">
        <button class="close-btn" id="closeBtn">✖ إغلاق العرض</button>
        
        <div class="presentation-title">✨ رأي ونصيحة ✨</div>
        
        <div id="slideContent" class="slide">
            </div>

        <div class="presentation-footer">
            إعداد معلمي تقنية المعلومات بمدرسة محمد بن سليمان الغافري
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwbftO3KCxsgvihJUsV9ywexEH7xm0mm_LV9z1TZednRDQkiwjn4fHAF2zTbxZdUkIJ/exec';

        let feedbackData = [];
        let currentIndex = 0;

        const form = document.getElementById('surveyForm');
        form.addEventListener('submit', e => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = 'جاري الإرسال...';
            submitBtn.disabled = true;

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(() => {
                    alert('شكراً لمشاركتك يا بطل!');
                    form.reset();
                    submitBtn.innerText = 'إرسال المشاركة';
                    submitBtn.disabled = false;
                    fetchData(); 
                })
                .catch(err => {
                    alert('حدث خطأ، حاول مرة أخرى');
                    submitBtn.innerText = 'إرسال المشاركة';
                    submitBtn.disabled = false;
                });
        });

        function fetchData() {
            return fetch(scriptURL)
                .then(res => res.json())
                .then(data => {
                    feedbackData = data.reverse(); 
                })
                .catch(err => console.log('خطأ في جلب البيانات'));
        }

        async function startSlideshow() {
            await fetchData();
            if (feedbackData.length === 0) {
                alert("لا توجد مشاركات لعرضها بعد.");
                return;
            }
            
            document.getElementById('slideshowContainer').style.display = 'flex';
            currentIndex = 0;
            showSlide();
        }

        function showSlide() {
            const content = document.getElementById('slideContent');
            const item = feedbackData[currentIndex];
            
            // إعادة تفعيل الأنيميشن عند كل نقرة
            content.style.animation = 'none';
            content.offsetHeight; /* trigger reflow */
            content.style.animation = 'fadeIn 0.8s ease-out';

            content.innerHTML = `
                <div class="slide-name">👤 الطالب: ${item.name}</div>
                <div class="slide-feedback">" ${item.feedback} "</div>
                ${item.advice ? `
                    <div class="slide-advice">
                        <strong>💡 نصيحة:</strong> ${item.advice}
                    </div>
                ` : ''}
                <div class="click-hint">👇 انقر في أي مكان للانتقال للمشاركة التالية</div>
            `;
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % feedbackData.length;
            showSlide();
        }

        function stopSlideshow() {
            document.getElementById('slideshowContainer').style.display = 'none';
        }

        // --- التحكم بالأزرار والنقرات ---

        // 1. إغلاق العرض عند النقر على زر الإغلاق
        document.getElementById('closeBtn').addEventListener('click', function(e) {
            e.stopPropagation(); // منع انتقال النفرة إلى الشاشة الخلفية
            stopSlideshow();
        });

        // 2. الانتقال للشريحة التالية عند النقر في أي مكان على الشاشة
        document.getElementById('slideshowContainer').addEventListener('click', function(e) {
            // يتم التغيير فقط إذا لم يكن العنصر المنقور هو زر الإغلاق
            if (e.target.id !== 'closeBtn') {
                nextSlide();
            }
        });

        fetchData();
    </script>
</body>
</html>
